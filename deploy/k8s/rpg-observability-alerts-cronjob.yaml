apiVersion: batch/v1
kind: CronJob
metadata:
  name: rpg-observability-alerts
  labels:
    app: rpg-observability-alerts
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: rpg-observability-alerts
        spec:
          restartPolicy: Never
          containers:
            - name: alert-emitter
              image: ghcr.io/your-org/rpg-backend:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -lc
                - |
                  python scripts/emit_runtime_alerts.py \
                    --window-seconds ${APP_OBS_ALERT_WINDOW_SECONDS}
              envFrom:
                - configMapRef:
                    name: rpg-backend-config
                - secretRef:
                    name: rpg-backend-secret
