apiVersion: apps/v1
kind: Deployment
metadata:
  name: rpg-backend
  labels:
    app: rpg-backend
spec:
  replicas: 2
  revisionHistoryLimit: 10
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: rpg-backend
  template:
    metadata:
      labels:
        app: rpg-backend
    spec:
      containers:
        - name: rpg-backend
          image: ghcr.io/your-org/rpg-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - rpg_backend.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --workers
            - "2"
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: rpg-backend-config
            - secretRef:
                name: rpg-backend-secret

          # Liveness: process is alive and serving HTTP.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          # Readiness: DB + LLM config + cached who_are_you probe.
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 2
            successThreshold: 1

          # Startup: allow slow warm-up without liveness restarts.
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 2

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: rpg-backend
  labels:
    app: rpg-backend
spec:
  selector:
    app: rpg-backend
  ports:
    - name: http
      port: 80
      targetPort: http
