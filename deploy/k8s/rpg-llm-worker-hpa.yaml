apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rpg-llm-worker
  labels:
    app: rpg-llm-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rpg-llm-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
