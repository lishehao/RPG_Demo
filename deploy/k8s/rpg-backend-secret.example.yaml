apiVersion: v1
kind: Secret
metadata:
  name: rpg-backend-secret
  labels:
    app: rpg-backend
type: Opaque
stringData:
  APP_DATABASE_URL: "postgresql+psycopg://rpg_user:replace-password@postgres.example.internal:5432/rpg_prod"
  APP_LLM_OPENAI_BASE_URL: "https://dashscope-us.aliyuncs.com/compatible-mode"
  APP_LLM_OPENAI_API_KEY: "replace-with-real-key"
  APP_OBS_ALERT_WEBHOOK_URL: "https://hooks.example.internal/rpg-alerts"
