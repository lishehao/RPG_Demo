apiVersion: v1
kind: Secret
metadata:
  name: rpg-backend-secret
  labels:
    app: rpg-backend
type: Opaque
stringData:
  APP_DATABASE_URL: "postgresql+psycopg://rpg_user:replace-password@postgres.example.internal:5432/rpg_prod"
  APP_AUTH_JWT_SECRET: "replace-with-strong-jwt-secret"
  APP_AUTH_JWT_EXPIRE_MINUTES: "480"
  APP_AUTH_JWT_ISSUER: "rpg-backend"
  APP_ADMIN_BOOTSTRAP_EMAIL: "ops-admin@example.com"
  APP_ADMIN_BOOTSTRAP_PASSWORD: "replace-with-strong-admin-password"
  APP_INTERNAL_WORKER_TOKEN: "replace-with-shared-worker-token"
  APP_LLM_OPENAI_BASE_URL: "https://dashscope-us.aliyuncs.com/compatible-mode"
  APP_LLM_OPENAI_API_KEY: "replace-with-real-key"
  APP_OBS_ALERT_WEBHOOK_URL: "https://hooks.example.internal/rpg-alerts"
