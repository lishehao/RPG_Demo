services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rpg_local
      POSTGRES_PASSWORD: rpg_local
      POSTGRES_DB: rpg_dev
    ports:
      - "127.0.0.1:8132:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg_local -d rpg_dev"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/local/postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro

volumes:
  postgres_data:
